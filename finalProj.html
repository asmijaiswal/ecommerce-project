<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
    <link rel="stylesheet" href="finalProj.css">
</head>
<body>
    <body>

    <div id="productModel" class="model">
        <div class="model-content">
            <span onclick="closeModel()">❌</span>
            <div id="modelBody"></div>
        </div>
    </div>

    <h1>My Store</h1>

    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <input
        type="text"
        id="search"
        placeholder="Search Product"
    >

    <button id="searchBtn">Search</button>

    <br><br>

    <select id="categoryFilter">

        <option value="all">All Categories</option>

        <option value="electronics">Electronics</option>

        <option value="clothing">Clothing</option>

        <option value="accessories">Accessories</option>

    </select>

    <select id="priceFilter">

        <option value="all">All Prices</option>

        <option value="1000">Under ₹1000</option>

        <option value="5000">Under ₹5000</option>

        <option value="10000">Under ₹10000</option>

    </select>

    <select id="sortOption">

        <option value="default">Default Sorting</option>

        <option value="lowToHigh">Price Low To High</option>

        <option value="highToLow">Price High To Low</option>

    </select>

    <br><br>

    <button onclick="showAllProducts()">
        Show All
    </button>

    <div id="products"></div>

    <hr>

    <h2>Cart</h2>

    <div id="cartItems"></div>

    <h3 id="Total">Total Price = ₹0</h3>

    <h1>
        Cart Count =
        <span id="count">0</span>
    </h1>

    <input
        type="text"
        id="couponInput"
        placeholder="Enter Coupon"
    >

    <button onclick="applyCoupon()">
        Apply Coupon
    </button>

    <hr>

    <h2>Wishlist</h2>

    <div id="wishlistItems"></div>

    <h1>
        Wishlist Count =
        <span id="wishCount">0</span>
    </h1>

    <hr>

    <h2>Customer Details</h2>

    <input
        type="text"
        id="customerName"
        placeholder="Enter Name"
    >

    <br><br>

    <input
        type="text"
        id="phone"
        placeholder="Enter Phone Number"
    >

    <br><br>

    <input
        type="text"
        id="address"
        placeholder="Enter Address"
    >

    <br><br>

    <button onclick="checkout()">
        Checkout
    </button>

    <div id="orderSummary"></div>

    <hr>

    <h2>Order History</h2>

    <div id="orders"></div>

    <div id="toast"></div>

    <script src="finalProj.js"></script>
</body>
</html>
